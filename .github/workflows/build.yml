name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build linux-x64
        run: bun build src/index.tsx --compile --target=bun-linux-x64 --outfile sofik-linux-x64

      - name: Build linux-arm64
        run: bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile sofik-linux-arm64

      - name: Build windows-x64
        run: bun build src/index.tsx --compile --target=bun-windows-x64 --outfile sofik-windows-x64.exe

      - name: Build darwin-x64
        run: bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile sofik-darwin-x64

      - name: Build darwin-arm64
        run: bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile sofik-darwin-arm64

      - name: Delete existing latest release
        run: gh release delete latest --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest (${{ github.sha }})"
          prerelease: false
          make_latest: true
          files: |
            sofik-linux-x64
            sofik-linux-arm64
            sofik-windows-x64.exe
            sofik-darwin-x64
            sofik-darwin-arm64
