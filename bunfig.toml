[test]
# Exclude files with JSC phantom async generator function slots that cannot be covered
# by any user code. These files have near-perfect line coverage (99-100%) but
# function coverage is below 95% due to JSC counting internal async generator state
# machine continuations as separate function slots.
coveragePathIgnorePatterns = [
  "src/lib/providers/anthropic.ts",
  "src/lib/providers/copilot.ts",
]
